services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - file_data:/data
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - TIKA_URL=http://tika:9998
      - FILESTORE_BASE_PATH=/data
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      tika:
        condition: service_started
    command: ["uvicorn", "agentic_fs.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    volumes:
      - ./src:/app/src
      - file_data:/data
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - TIKA_URL=http://tika:9998
      - FILESTORE_BASE_PATH=/data
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      tika:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"

volumes:
  file_data:
  qdrant_data:
